evaluation:
  best_metric: r2
  plots: true
  report: true
  scoring:
  - r2
  - rmse
  - mae
output:
  directory: null
  save_models: true
  save_preprocessed: true
preprocessing:
  imputation_method: mice
  random_state: 42
  scaling: true
  test_split_ratio: 0.2
training:
  cv: 5
  models:
  - ridge
  - rf
  - gb
  n_jobs: -1
  param_grids:
    gb:
      learning_rate:
      - 0.01
      - 0.1
      n_estimators:
      - 100
      - 200
    rf:
      max_depth:
      - 5
      - 10
      - null
      n_estimators:
      - 100
      - 200
      - 500
    ridge:
      alpha:
      - 0.01
      - 0.1
      - 1.0
      - 10.0
      - 100.0
